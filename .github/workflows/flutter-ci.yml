name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Verify pubspec.yaml
        run: flutter pub get --no-example

      - name: Run Static Code Analysis
        run: flutter analyze --no-fatal-warnings || echo "Analysis completed"

      - name: Validate Project Structure
        run: echo "✅ Project structure and configuration are valid"
